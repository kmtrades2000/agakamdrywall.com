<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional drywall services for your home and business.">
    <meta name="keywords" content="drywall, installation, repair, commercial, residential">
    <meta name="author" content="Agakam Drywall">
    <title>Agakam Drywall Services</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Agakam Drywall</h1>
        <p>Your trusted partner for professional drywall services.</p>
    </header>

    <main>
        <section>
            <h2>Contact Us</h2>
            <p>Have a project in mind? Get in touch with our team today for a free consultation and estimate.</p>
            <form action="https://formsubmit.co/co@agakamdrywall.com" method="POST">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone (Optional):</label>
                    <input type="tel" id="phone" name="phone">
                </div>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" placeholder="Describe your project or ask any questions..." required></textarea>
                </div>

                <!-- FormSubmit.co hidden fields for better UX -->
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value="https://yourdomain.com/thank-you.html">

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Agakam Drywall. All rights reserved.</p>
    </footer>
</body>
</html>

body {

h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 700; line-height: 1.1; margin-bottom: 1rem; color: #2b2b2b; }
h1 em { color: #c8832a; font-style: italic; }
p { font-size: 1rem; color: #444444; line-height: 1.8; max-width: 420px; margin: 0 auto 2.5rem; }
.btn { background: #2b2b2b; color: #ffffff; padding: 0.95rem 2.2rem; border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none; display: inline-block; transition: background 0.2s; }
.btn:hover { background: #c8832a; }

/* Dark mode */
@media (prefers-color-scheme: dark) {
  body { background: #1e1e1e; color: #f0f0f0; }
  .logo { color: #f0f0f0; }
  h1 { color: #f0f0f0; }
  p { color: #cccccc; }
  .btn { background: #c8832a; color: #ffffff; }
  .btn:hover { background: #e09a40; }
}
